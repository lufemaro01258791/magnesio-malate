<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Magnesium Malate Total Health 1000mg - Energía y Bienestar Natural</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-bg: #F8F8F8; /* Light beige/off-white */
            --dark-text: #333;
            --accent-orange: #FF6600; /* Bright orange */
            --dark-orange: #CC5200; /* Darker orange for accents */
            --black: #000;
            --white: #FFF;
            --success-green: #28a745;
            --shadow-light: rgba(0, 0, 0, 0.08);
            --shadow-medium: rgba(0, 0, 0, 0.15);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Poppins', sans-serif;
            line-height: 1.6;
            color: var(--dark-text);
            background-color: var(--primary-bg);
            overflow-x: hidden; /* Prevent horizontal scroll */
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 15px;
        }

        /* Utility Classes */
        .text-center { text-align: center; }
        .text-left { text-align: left; }
        .text-right { text-align: right; }
        .mb-4 { margin-bottom: 1.5rem; }
        .mb-6 { margin-bottom: 2.5rem; }
        .mt-6 { margin-top: 2.5rem; }
        .py-6 { padding-top: 2.5rem; padding-bottom: 2.5rem; }
        .py-8 { padding-top: 4rem; padding-bottom: 4rem; }
        .bg-white { background-color: var(--white); }
        .bg-dark-orange { background-color: var(--dark-orange); }
        .text-white { color: var(--white); }
        .text-accent-orange { color: var(--accent-orange); }
        .font-bold { font-weight: 700; }
        .font-semibold { font-weight: 600; }

        h1, h2, h3 {
            margin-bottom: 1rem;
            line-height: 1.2;
            color: var(--dark-text);
        }
        h1 { font-size: 2.5rem; }
        h2 { font-size: 2rem; }
        h3 { font-size: 1.5rem; }

        @media (min-width: 768px) {
            h1 { font-size: 3.5rem; }
            h2 { font-size: 2.5rem; }
            h3 { font-size: 1.8rem; }
        }

        .btn {
            display: inline-block;
            background-color: var(--accent-orange);
            color: var(--white);
            padding: 1rem 2rem;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 700;
            font-size: 1.2rem;
            transition: background-color 0.3s ease, transform 0.2s ease;
            border: none;
            cursor: pointer;
            box-shadow: 0 4px 15px var(--shadow-medium);
        }
        .btn:hover {
            background-color: var(--dark-orange);
            transform: translateY(-2px);
        }
        .btn-small {
            padding: 0.75rem 1.5rem;
            font-size: 1rem;
        }

        /* Hero Section */
        .hero {
            background-color: var(--white);
            padding: 4rem 0;
            text-align: center;
            position: relative;
            overflow: hidden;
        }
        .hero-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2rem;
        }
        @media (min-width: 768px) {
            .hero-content {
                flex-direction: row;
                text-align: left;
                justify-content: center;
            }
            .hero-text {
                flex: 1;
                max-width: 500px;
            }
            .hero-image-wrapper {
                flex: 1;
                max-width: 400px;
            }
        }
        .hero h1 {
            font-size: 2.8rem;
            margin-bottom: 1rem;
            color: var(--black);
        }
        .hero h1 span {
            color: var(--accent-orange);
        }
        .hero p {
            font-size: 1.1rem;
            margin-bottom: 1.5rem;
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
        }
        .price-info {
            margin-top: 1.5rem;
            margin-bottom: 2rem;
        }
        .price-normal {
            font-size: 1.4rem;
            color: #888;
            text-decoration: line-through;
            margin-right: 1rem;
        }
        .price-offer {
            font-size: 2.5rem;
            color: var(--accent-orange);
            font-weight: 700;
            display: block;
            margin-top: 0.5rem;
        }
        .discount-badge {
            background-color: var(--accent-orange);
            color: var(--white);
            padding: 0.5rem 1rem;
            border-radius: 5px;
            font-weight: 700;
            font-size: 1.1rem;
            display: inline-block;
            margin-left: 1rem;
        }

        /* Product Image Placeholder */
        .product-image-placeholder {
            width: 280px;
            height: 350px;
            background: linear-gradient(to bottom, var(--black) 30%, var(--dark-orange) 30%, var(--dark-orange) 70%, var(--black) 70%);
            border-radius: 15px;
            position: relative;
            box-shadow: 0 10px 30px var(--shadow-medium);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin: 0 auto;
            padding: 20px;
            overflow: hidden;
            border: 2px solid var(--black);
        }
        .product-image-placeholder::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 60px;
            background-color: var(--black);
            border-radius: 15px 15px 0 0;
            z-index: 1;
        }
        .product-image-placeholder::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 60px;
            background-color: var(--black);
            border-radius: 0 0 15px 15px;
            z-index: 1;
        }
        .product-image-placeholder .label-top {
            position: absolute;
            top: 20px;
            color: var(--white);
            font-size: 0.9rem;
            font-weight: 600;
            z-index: 2;
        }
        .product-image-placeholder .label-top::before {
            content: 'Total Health';
            display: block;
            font-size: 0.8rem;
            margin-bottom: 5px;
            color: var(--accent-orange);
        }
        .product-image-placeholder .main-label {
            color: var(--white);
            font-size: 2.2rem;
            font-weight: 700;
            text-transform: uppercase;
            line-height: 1;
            z-index: 2;
            margin-top: 20px;
        }
        .product-image-placeholder .sub-label {
            color: var(--white);
            font-size: 1.2rem;
            font-weight: 600;
            margin-top: 5px;
            z-index: 2;
        }
        .product-image-placeholder .mg-label {
            color: var(--accent-orange);
            font-size: 1.8rem;
            font-weight: 700;
            z-index: 2;
        }
        .product-image-placeholder .details-text {
            color: var(--white);
            font-size: 0.75rem;
            margin-top: 10px;
            text-align: center;
            z-index: 2;
        }
        .product-image-placeholder .badge-usa {
            position: absolute;
            bottom: 70px;
            left: 20px;
            background-color: var(--white);
            color: var(--black);
            padding: 5px 10px;
            border-radius: 5px;
            font-size: 0.7rem;
            font-weight: 600;
            z-index: 2;
        }
        .product-image-placeholder .badge-capsules {
            position: absolute;
            bottom: 70px;
            right: 20px;
            background-color: var(--white);
            color: var(--black);
            padding: 5px 10px;
            border-radius: 5px;
            font-size: 0.7rem;
            font-weight: 600;
            z-index: 2;
        }
        .product-image-placeholder .dots-pattern {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100%;
            height: 100%;
            background-image: radial-gradient(circle, rgba(255,255,255,0.2) 1px, transparent 1px);
            background-size: 10px 10px;
            z-index: 0;
        }

        /* Badges under product image */
        .product-badges {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            margin-top: 1.5rem;
            max-width: 400px;
            margin-left: auto;
            margin-right: auto;
        }
        .product-badge {
            background-color: var(--dark-text);
            color: var(--white);
            padding: 0.5rem 1rem;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .product-badge svg {
            width: 18px;
            height: 18px;
            fill: var(--accent-orange);
        }

        /* Stock & Timer */
        .stock-timer-wrapper {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            margin-top: 2rem;
            align-items: center;
        }
        @media (min-width: 768px) {
            .stock-timer-wrapper {
                flex-direction: row;
                justify-content: center;
            }
        }
        .stock-counter, .offer-timer {
            background-color: var(--dark-text);
            color: var(--white);
            padding: 0.75rem 1.5rem;
            border-radius: 50px;
            font-weight: 600;
            font-size: 1rem;
            display: flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 2px 10px var(--shadow-medium);
        }
        .stock-counter span, .offer-timer span {
            color: var(--accent-orange);
            font-weight: 700;
        }
        .stock-counter .icon, .offer-timer .icon {
            font-size: 1.2rem;
        }

        /* Section Styling */
        section {
            padding: 4rem 0;
        }
        section:nth-of-type(even) {
            background-color: var(--white);
        }
        section h2 {
            text-align: center;
            margin-bottom: 3rem;
            position: relative;
        }
        section h2::after {
            content: '';
            display: block;
            width: 60px;
            height: 4px;
            background-color: var(--accent-orange);
            margin: 10px auto 0;
            border-radius: 2px;
        }

        /* Problems Section */
        .problem-cards {
            display: grid;
            grid-template-columns: 1fr;
            gap: 2rem;
        }
        @media (min-width: 768px) {
            .problem-cards {
                grid-template-columns: repeat(3, 1fr);
            }
        }
        .problem-card {
            background-color: var(--white);
            padding: 2rem;
            border-radius: 10px;
            box-shadow: 0 5px 20px var(--shadow-light);
            text-align: center;
            transition: transform 0.3s ease;
        }
        .problem-card:hover {
            transform: translateY(-5px);
        }
        .problem-card .icon {
            font-size: 3rem;
            color: var(--accent-orange);
            margin-bottom: 1rem;
            display: block;
        }
        .problem-card h3 {
            font-size: 1.3rem;
            margin-bottom: 0.8rem;
        }
        .problem-card p {
            font-size: 0.95rem;
            color: #555;
        }

        /* Benefits Section */
        .benefits-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 1.5rem;
        }
        @media (min-width: 768px) {
            .benefits-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }
        .benefit-item {
            display: flex;
            align-items: flex-start;
            gap: 1rem;
            background-color: var(--white);
            padding: 1.5rem;
            border-radius: 10px;
            box-shadow: 0 3px 15px var(--shadow-light);
        }
        .benefit-item .icon {
            font-size: 2rem;
            color: var(--accent-orange);
            flex-shrink: 0;
        }
        .benefit-item h3 {
            font-size: 1.2rem;
            margin-bottom: 0.5rem;
        }
        .benefit-item p {
            font-size: 0.9rem;
            color: #555;
        }

        /* Results Section */
        .results-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 2rem;
            text-align: center;
        }
        @media (min-width: 768px) {
            .results-grid {
                grid-template-columns: repeat(3, 1fr);
            }
        }
        .result-item {
            background-color: var(--white);
            padding: 2rem;
            border-radius: 10px;
            box-shadow: 0 5px 20px var(--shadow-light);
        }
        .result-item .stat {
            font-size: 3.5rem;
            font-weight: 700;
            color: var(--accent-orange);
            line-height: 1;
            margin-bottom: 0.5rem;
        }
        .result-item p {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--dark-text);
        }

        /* How It Works Section */
        .how-it-works-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 2rem;
        }
        @media (min-width: 768px) {
            .how-it-works-grid {
                grid-template-columns: repeat(3, 1fr);
            }
        }
        .step-item {
            background-color: var(--white);
            padding: 2rem;
            border-radius: 10px;
            box-shadow: 0 5px 20px var(--shadow-light);
            text-align: center;
        }
        .step-item .step-number {
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--accent-orange);
            margin-bottom: 1rem;
            display: block;
        }
        .step-item h3 {
            font-size: 1.3rem;
            margin-bottom: 0.8rem;
        }
        .step-item p {
            font-size: 0.95rem;
            color: #555;
        }

        /* Nutritional Table Section */
        .nutritional-table-wrapper {
            background-color: var(--black);
            color: var(--white);
            padding: 2rem;
            border-radius: 10px;
            max-width: 450px;
            margin: 0 auto;
            box-shadow: 0 5px 20px var(--shadow-medium);
        }
        .nutritional-table-wrapper h3 {
            color: var(--white);
            font-size: 1.8rem;
            margin-bottom: 1.5rem;
            text-align: center;
        }
        .nutritional-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.95rem;
        }
        .nutritional-table th, .nutritional-table td {
            padding: 10px 0;
            border-bottom: 1px solid #444;
            text-align: left;
        }
        .nutritional-table th {
            font-weight: 600;
            color: var(--accent-orange);
        }
        .nutritional-table tr:last-child td {
            border-bottom: none;
        }
        .nutritional-table .serving-info {
            font-size: 0.85rem;
            color: #bbb;
            margin-bottom: 1rem;
            display: block;
        }
        .nutritional-table .amount-header {
            text-align: center;
            font-weight: 700;
            color: var(--white);
            background-color: #222;
            padding: 8px 0;
            border-radius: 5px;
            margin-bottom: 10px;
            display: block;
        }
        .nutritional-table .ingredient-name {
            padding-left: 10px;
        }
        .nutritional-table .sub-ingredient {
            padding-left: 20px;
            font-size: 0.85rem;
            color: #ccc;
        }
        .nutritional-table .dv {
            text-align: right;
        }
        .nutritional-table .disclaimer {
            font-size: 0.8rem;
            color: #888;
            margin-top: 1.5rem;
            display: block;
        }

        /* Testimonials Section */
        .testimonials-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 2rem;
        }
        @media (min-width: 768px) {
            .testimonials-grid {
                grid-template-columns: repeat(3, 1fr);
            }
        }
        .testimonial-card {
            background-color: var(--white);
            padding: 2rem;
            border-radius: 10px;
            box-shadow: 0 5px 20px var(--shadow-light);
            position: relative;
        }
        .testimonial-card .stars {
            color: gold;
            margin-bottom: 1rem;
            font-size: 1.2rem;
        }
        .testimonial-card p {
            font-style: italic;
            margin-bottom: 1rem;
            color: #555;
        }
        .testimonial-card .author {
            font-weight: 600;
            color: var(--dark-text);
        }
        .testimonial-card .city {
            font-size: 0.9rem;
            color: #777;
        }
        .testimonial-card::before {
            content: '“';
            position: absolute;
            top: 10px;
            left: 15px;
            font-size: 4rem;
            color: rgba(0,0,0,0.1);
            line-height: 1;
        }

        /* Packages Section */
        .packages-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 2rem;
        }
        @media (min-width: 768px) {
            .packages-grid {
                grid-template-columns: repeat(3, 1fr);
            }
        }
        .package-card {
            background-color: var(--white);
            padding: 2rem;
            border-radius: 10px;
            box-shadow: 0 5px 20px var(--shadow-light);
            text-align: center;
            border: 2px solid transparent;
            transition: border-color 0.3s ease, transform 0.3s ease;
            position: relative;
        }
        .package-card.popular {
            border-color: var(--accent-orange);
            transform: translateY(-10px);
        }
        .package-card.popular::before {
            content: '¡Más Popular!';
            position: absolute;
            top: -15px;
            left: 50%;
            transform: translateX(-50%);
            background-color: var(--accent-orange);
            color: var(--white);
            padding: 0.3rem 1rem;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 700;
            white-space: nowrap;
        }
        .package-card h3 {
            font-size: 1.5rem;
            margin-bottom: 1rem;
            color: var(--dark-text);
        }
        .package-card .price {
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--accent-orange);
            margin-bottom: 0.5rem;
        }
        .package-card .savings {
            font-size: 0.9rem;
            color: #777;
            margin-bottom: 1.5rem;
            display: block;
        }
        .package-card .savings strong {
            color: var(--dark-orange);
        }
        .package-card .cta-package {
            width: 100%;
            font-size: 1.1rem;
            padding: 0.8rem 1.5rem;
        }
        .package-card .payment-info {
            font-size: 0.85rem;
            color: #888;
            margin-top: 1rem;
        }

        /* Checkout Form */
        .checkout-form-section {
            background-color: var(--white);
            padding: 4rem 0;
        }
        .checkout-form-wrapper {
            max-width: 700px;
            margin: 0 auto;
            background-color: var(--primary-bg);
            padding: 2.5rem;
            border-radius: 10px;
            box-shadow: 0 5px 25px var(--shadow-medium);
        }
        .checkout-form-wrapper h2 {
            margin-bottom: 2rem;
        }
        .form-group {
            margin-bottom: 1.5rem;
        }
